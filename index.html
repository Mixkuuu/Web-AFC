<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFC Website</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <h2>AFC</h2>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a onclick="goTo('home')">Home</a>
    <a onclick="goTo('struktur')">Struktur</a>
    <a onclick="goTo('about')">About</a>
</div>

<!-- MUSIC -->
<audio id="bg-music" loop>
    <source src="assets/music.mp3" type="audio/mp3">
</audio>
<button class="music-btn" onclick="toggleMusic()">🎵</button>

<!-- HOME -->
<section id="home" class="section">
    <img src="assets/logo.png" class="logo">
    <h1>Anime Family Creator</h1>
    <p>Selamat datang di website resmi AFC 🌸</p>

    <a href="https://www.tiktok.com" class="btn btn-click">TikTok AFC</a>

    <div class="stats">
        <div class="card btn-click">Member<br><b>124</b></div>
        <div class="card btn-click">Admin<br><b>6</b></div>
    </div>
</section>

<!-- STRUKTUR -->
<section id="struktur" class="section">

<h2>Struktur Jabatan</h2>

<div class="owner anime-card btn-click"
onclick="openPopup('Pemilik','Mixkuuu','Hatsune Miku','@Mixku_1','Owner')">
<img src="assets/owner.png">
<p>Pemilik</p>
</div>

<div class="line"></div>

<div class="admins">

<div class="admin anime-card btn-click"
onclick="openPopup('Admin 1','Fynz','Shiroko','@fynsz5','Admin')">
<img src="assets/admin1.png"><p>Admin 1</p></div>

<div class="admin anime-card btn-click"
onclick="openPopup('Admin 2','Nama','Waifu','TikTok','Admin')">
<img src="assets/admin2.png"><p>Admin 2</p></div>

</div>

</section>

<!-- ABOUT -->
<section id="about" class="section">
<h2>About AFC</h2>
<p>Komunitas editor CapCut & Alight Motion 🔥</p>
</section>

<!-- POPUP -->
<div class="popup-bg" id="popup-bg">
<div class="popup-box">
<h3 id="popup-title"></h3>
<p>Nama: <span id="pp-nama"></span></p>
<p>Waifu: <span id="pp-waifu"></span></p>
<p>TikTok: <span id="pp-tt"></span></p>
<p>Status: <span id="pp-status"></span></p>
<button onclick="closePopup()">Tutup</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
